[pytest]
# Pytest configuration for Playwright tests only
# This configuration avoids loading Django/pytest-django
python_files = test_*.py
python_functions = test_*
testpaths = .
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:django

markers =
    screenshot: Tests that capture screenshots
    smoke: Smoke tests for critical paths
    ux: UX audit tests
    slow: Slow running tests
    unit: Unit tests
    integration: Integration tests
