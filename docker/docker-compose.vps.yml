services:
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - ${REDIS_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 300m
    cpus: 0.5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # SQLite-first, but allow override via deploy/.env (e.g., Postgres) without editing compose.
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/db.sqlite3}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-127.0.0.1,localhost}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      AGOMTRADEPRO_ENCRYPTION_KEY: ${AGOMTRADEPRO_ENCRYPTION_KEY:-}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-True}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-True}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-True}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-31536000}
      SECURE_HSTS_INCLUDE_SUBDOMAINS: ${SECURE_HSTS_INCLUDE_SUBDOMAINS:-True}
      SECURE_HSTS_PRELOAD: ${SECURE_HSTS_PRELOAD:-True}
    volumes:
      - sqlite_data:/app/data
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    mem_limit: 700m
    cpus: 1.0
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  celery_worker:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    restart: unless-stopped
    command: ["celery", "-A", "core", "worker", "-l", "info", "--concurrency", "1"]
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.production
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/db.sqlite3}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY:-}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-127.0.0.1,localhost}
      AGOMTRADEPRO_ENCRYPTION_KEY: ${AGOMTRADEPRO_ENCRYPTION_KEY:-}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-True}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-True}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-True}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-31536000}
      SECURE_HSTS_INCLUDE_SUBDOMAINS: ${SECURE_HSTS_INCLUDE_SUBDOMAINS:-True}
      SECURE_HSTS_PRELOAD: ${SECURE_HSTS_PRELOAD:-True}
    volumes:
      - sqlite_data:/app/data
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    mem_limit: 500m
    cpus: 1.0
    logging:
      driver: "json-file"
      options:
        max-size: "25m"
        max-file: "5"

  celery_beat:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    restart: unless-stopped
    command: ["celery", "-A", "core", "beat", "-l", "info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.production
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/db.sqlite3}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY:-}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-127.0.0.1,localhost}
      AGOMTRADEPRO_ENCRYPTION_KEY: ${AGOMTRADEPRO_ENCRYPTION_KEY:-}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-True}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-True}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-True}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-31536000}
      SECURE_HSTS_INCLUDE_SUBDOMAINS: ${SECURE_HSTS_INCLUDE_SUBDOMAINS:-True}
      SECURE_HSTS_PRELOAD: ${SECURE_HSTS_PRELOAD:-True}
    volumes:
      - sqlite_data:/app/data
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    mem_limit: 300m
    cpus: 0.5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rsshub:
    image: ${RSSHUB_IMAGE:-diygod/rsshub:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CACHE_TYPE: redis
      REDIS_URL: redis://redis:6379/2
      LISTEN_INADDR_ANY: "1"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "1"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:1200/healthz', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    mem_limit: 500m

  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - static_data:/srv/static:ro
      - media_data:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    mem_limit: 200m

volumes:
  sqlite_data:
  redis_data:
  static_data:
  media_data:
  caddy_data:
  caddy_config:
