services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:15-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agomsaaf}
      POSTGRES_USER: ${POSTGRES_USER:-agomsaaf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agomsaaf} -d ${POSTGRES_DB:-agomsaaf}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-agomsaaf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agomsaaf}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-127.0.0.1,localhost}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  celery_worker:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    restart: unless-stopped
    command: ["celery", "-A", "core", "worker", "-l", "info", "--concurrency", "2"]
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.production
      DATABASE_URL: postgresql://${POSTGRES_USER:-agomsaaf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agomsaaf}
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-127.0.0.1,localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    restart: unless-stopped
    command: ["celery", "-A", "core", "beat", "-l", "info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.production
      DATABASE_URL: postgresql://${POSTGRES_USER:-agomsaaf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agomsaaf}
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-127.0.0.1,localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - static_data:/srv/static:ro
      - media_data:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
  static_data:
  media_data:
  caddy_data:
  caddy_config:
