components:
  schemas:
    AIProviderConfig:
      type: object
      description: AI提供商配置序列化器
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: 配置名称（唯一标识）
          maxLength: 50
        provider_type:
          allOf:
          - $ref: '#/components/schemas/ProviderTypeEnum'
          description: |-
            提供商类型

            * `openai` - OpenAI
            * `deepseek` - DeepSeek
            * `qwen` - 通义千问
            * `moonshot` - Moonshot
            * `custom` - 自定义
        is_active:
          type: boolean
          description: 是否启用
        priority:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          description: 优先级（数字越小越优先，用于failover）
        base_url:
          type: string
          format: uri
          description: API Base URL（如 https://api.openai.com/v1）
          maxLength: 500
        api_key:
          type: string
          description: API Key (plaintext, deprecated - use api_key_encrypted)
          maxLength: 500
        default_model:
          type: string
          description: 默认模型名称
          maxLength: 50
        api_mode:
          allOf:
          - $ref: '#/components/schemas/ApiModeEnum'
          description: |-
            OpenAI API 模式：dual/responses_only/chat_only

            * `dual` - Dual (Responses + Chat Fallback)
            * `responses_only` - Responses Only
            * `chat_only` - Chat Completions Only
        fallback_enabled:
          type: boolean
          description: dual 模式下是否允许从 Responses 回退到 Chat Completions
        daily_budget_limit:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
          description: 每日预算限制（美元）
        monthly_budget_limit:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
          description: 每月预算限制（美元）
        extra_config:
          description: 额外配置参数
        description:
          type: string
          description: 描述
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        last_used_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: 最后使用时间
      required:
      - base_url
      - name
      - provider_type
