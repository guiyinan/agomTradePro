openapi: 3.0.3
info:
  title: AgomTradePro API
  version: 1.0.0
  description: Agom Strategic Asset Allocation Framework API
paths:
  /api/account/assets/:
    get:
      operationId: api_account_assets_get
      description: |-
        资产元数据 API ViewSet (只读)

        - GET /api/account/assets/ - 获取资产列表
        - GET /api/account/assets/{id}/ - 获取资产详情
        - GET /api/account/assets/by-class/{asset_class}/ - 按类别查询
      parameters:
      - name: page
        required: false
        in: query
        description: 分页结果集中的页码。
        schema:
          type: integer
      tags:
      - account
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAssetMetadataList'
          description: ''
  /api/account/assets/{id}/:
    get:
      operationId: api_account_assets_by_id_get
      description: |-
        资产元数据 API ViewSet (只读)

        - GET /api/account/assets/ - 获取资产列表
        - GET /api/account/assets/{id}/ - 获取资产详情
        - GET /api/account/assets/by-class/{asset_class}/ - 按类别查询
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - account
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetMetadata'
          description: ''
  /api/account/assets/by-class/{asset_class}/:
    get:
      operationId: api_account_assets_by_class_by_asset_class_get
      description: |-
        按资产类别查询

        GET /api/account/assets/by-class/{asset_class}/
      parameters:
      - in: path
        name: asset_class
        schema:
          type: string
          pattern: ^[^/]+$
        required: true
      tags:
      - account
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
