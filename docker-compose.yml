# AgomSAAF Docker Compose 配置
# 用于开发和生产环境

version: '3.8'

services:
  # Redis 服务
  redis:
    image: redis:7-alpine
    container_name: agomsaaf_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # PostgreSQL 数据库（生产环境使用）
  postgres:
    image: postgres:15-alpine
    container_name: agomsaaf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agomsaaf
      POSTGRES_USER: agomsaaf
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agomsaaf"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Web 服务
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agomsaaf_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://agomsaaf:${POSTGRES_PASSWORD:-changeme}@postgres:5432/agomsaaf
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agomsaaf_celery_worker
    restart: unless-stopped
    command: celery -A core worker -l info --concurrency=2
    env_file:
      - .env
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://agomsaaf:${POSTGRES_PASSWORD:-changeme}@postgres:5432/agomsaaf
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Beat（定时任务调度）
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agomsaaf_celery_beat
    restart: unless-stopped
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://agomsaaf:${POSTGRES_PASSWORD:-changeme}@postgres:5432/agomsaaf
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: agomsaaf_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - web
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local

networks:
  default:
    name: agomsaaf_network
