# AgomTradePro Docker Compose 配置
# 默认使用本地 SQLite + Redis，便于单机开发/打包复用同一份数据。

services:
  redis:
    image: redis:7-alpine
    container_name: agomtradepro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agomtradepro_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=False
      - DATABASE_URL=sqlite:////app/db.sqlite3
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agomtradepro_celery_worker
    restart: unless-stopped
    command: celery -A core worker -l info --concurrency=2
    env_file:
      - .env
    environment:
      - DEBUG=False
      - DATABASE_URL=sqlite:////app/db.sqlite3
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agomtradepro_celery_beat
    restart: unless-stopped
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      - DEBUG=False
      - DATABASE_URL=sqlite:////app/db.sqlite3
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: agomtradepro_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - web
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local

networks:
  default:
    name: agomtradepro_network
