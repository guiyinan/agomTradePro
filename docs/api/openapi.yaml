openapi: 3.0.3
info:
  title: AgomSAAF API
  version: 1.0.0
  description: Agom Strategic Asset Allocation Framework API
paths:
  /account/api/assets/:
    get:
      operationId: account_api_assets_list
      description: |-
        资产元数据 API ViewSet (只读)

        - GET /account/api/assets/ - 获取资产列表
        - GET /account/api/assets/{id}/ - 获取资产详情
        - GET /account/api/assets/by-class/{asset_class}/ - 按类别查询
      parameters:
      - name: page
        required: false
        in: query
        description: 分页结果集中的页码。
        schema:
          type: integer
      tags:
      - account
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAssetMetadataList'
          description: ''
  /account/api/assets/{id}/:
    get:
      operationId: account_api_assets_retrieve
      description: |-
        资产元数据 API ViewSet (只读)

        - GET /account/api/assets/ - 获取资产列表
        - GET /account/api/assets/{id}/ - 获取资产详情
        - GET /account/api/assets/by-class/{asset_class}/ - 按类别查询
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: 标识此 资产元数据 的 唯一整数值。
        required: true
      tags:
      - account
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetMetadata'
          description: ''
  /account/api/assets/by-class/{asset_class}/:
    get:
      operationId: account_api_assets_by_class_retrieve
      description: |-
        按资产类别查询

        GET /account/api/assets/by-class/{asset_class}/
      parameters:
      - in: path
        name: asset_class
        schema:
          type: string
          pattern: ^[^/]+$
        required: true
      tags:
      - account
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetMetadata'
          description: ''
  /account/api/capital-flows/:
    get:
      operationId: account_api_capital_flows_list
      description: |-
        资金流水 API ViewSet

        提供以下接口:
        - GET /account/api/capital-flows/ - 获取资金流水列表
