name: Logic Guardrails

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Prepare database
        run: python manage.py migrate --noinput

      - name: Run logic guardrail suite
        run: |
          pytest -q \
            tests/guardrails/test_logic_guardrails.py \
            tests/guardrails/test_no_501_on_primary_paths.py \
            tests/integration/policy/test_policy_integration.py \
            tests/unit/policy/test_fetch_rss_use_case.py \
            tests/unit/regime/test_config_threshold_regression.py

      - name: Check RTM key requirements
        run: |
          # 验证关键 RTM 项的测试存在
          echo "Checking RTM requirements..."
          test -f tests/guardrails/test_logic_guardrails.py || exit 1
          test -f tests/guardrails/test_no_501_on_primary_paths.py || exit 1
          test -f tests/integration/signal/test_signal_workflow.py || exit 1
          test -f tests/integration/audit/test_api_endpoints.py || exit 1
          echo "RTM key requirements: PASSED"
