name: Consistency Check

on:
  push:
    branches: [main, 'dev/**']
  pull_request:
    branches: [main, 'dev/**']
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run consistency check
        run: |
          python scripts/check_doc_route_sdk_consistency.py --baseline reports/consistency/baseline.json

      - name: Run route consistency check
        run: |
          python scripts/check_routes.py --strict

      - name: Run governance consistency check
        run: |
          python scripts/check_governance_consistency.py \
            --baseline governance/governance_baseline.json \
            --write-report reports/consistency/governance-consistency.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: consistency-check-results
          path: reports/consistency/
          retention-days: 30
