name: Consistency Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run consistency check
        run: |
          python scripts/check_doc_route_sdk_consistency.py --baseline reports/consistency/baseline.json

      - name: Run route consistency check
        run: |
          # Run check and capture violation count (baseline: 34 known duplicate_api_route issues)
          ROUTE_BASELINE=34
          OUTPUT=$(python scripts/check_routes.py 2>&1) || true
          echo "$OUTPUT"
          VIOLATION_COUNT=$(echo "$OUTPUT" | grep -oP '发现 \K\d+' || echo "0")
          if [ "$VIOLATION_COUNT" -gt "$ROUTE_BASELINE" ]; then
            echo "::error::New route violations detected ($VIOLATION_COUNT > baseline $ROUTE_BASELINE)"
            exit 1
          elif [ "$VIOLATION_COUNT" -gt 0 ]; then
            echo "::warning::$VIOLATION_COUNT known route violations (baseline: $ROUTE_BASELINE)"
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consistency-check-results
          path: reports/consistency/
          retention-days: 30
