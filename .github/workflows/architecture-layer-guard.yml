name: Architecture Layer Guard

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - main
      - 'dev/**'
  push:
    branches:
      - main
      - 'dev/**'
  workflow_dispatch:

jobs:
  layer-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ['3.11', '3.13']
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Collect diff range
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
            echo "BASE_REF=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
            echo "HEAD_REF=${{ github.sha }}" >> "$GITHUB_ENV"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BASE_REF="${{ github.event.before }}"
            HEAD_REF="${{ github.sha }}"
            if [[ "${BASE_REF}" == "0000000000000000000000000000000000000000" ]] || ! git cat-file -e "${BASE_REF}^{commit}" 2>/dev/null; then
              if git rev-parse "${HEAD_REF}^" >/dev/null 2>&1; then
                BASE_REF="$(git rev-parse "${HEAD_REF}^")"
              else
                BASE_REF="${HEAD_REF}"
              fi
            fi
            echo "BASE_REF=${BASE_REF}" >> "$GITHUB_ENV"
            echo "HEAD_REF=${HEAD_REF}" >> "$GITHUB_ENV"
          else
            # workflow_dispatch: check only the latest commit to avoid flagging legacy code
            echo "BASE_REF=$(git rev-parse HEAD~1)" >> "$GITHUB_ENV"
            echo "HEAD_REF=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          fi

      - name: Enforce four-layer architecture guard
        shell: bash
        run: |
          set -euo pipefail
          python scripts/check_architecture_delta.py \
            --rules-file governance/architecture_rules.json \
            --base-ref "$BASE_REF" \
            --head-ref "$HEAD_REF" \
            --include-audit \
            --fail-on-audit-violations \
            --format text

      - name: Verify versioned architecture boundaries
        run: |
          python scripts/verify_architecture.py \
            --rules-file governance/architecture_rules.json \
            --format text

      - name: Enforce module cycle baseline
        run: |
          python scripts/check_module_cycles.py \
            --allowlist-file governance/module_cycle_allowlist.json \
            --fail-on-cycles \
            --format text

  structure-audit-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate structural architecture audit
        run: |
          python scripts/verify_architecture.py \
            --rules-file governance/architecture_rules.json \
            --format text \
            --include-audit \
            --write-report reports/architecture/architecture-audit.json \
            --write-ledger reports/architecture/module-ledger.md

      - name: Generate module cycle report
        run: |
          python scripts/check_module_cycles.py \
            --allowlist-file governance/module_cycle_allowlist.json \
            --format text \
            --write-report reports/architecture/module-cycles.json

      - name: Upload architecture audit artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: architecture-audit
          path: reports/architecture/
