name: Nightly Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 02:00 (北京时间 10:00)
  workflow_dispatch:  # 允许手动触发

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install -r requirements.txt
            pip install pytest pytest-cov pytest-xdist pytest-base-url pytest-playwright pytest-django
          fi
          pip install -e sdk/
          python -m playwright install chromium

      - name: Prepare database
        run: python manage.py migrate --noinput

      - name: Run Unit Tests (full)
        timeout-minutes: 25
        run: |
          python -m pytest tests/unit/ -q \
            -n 4 \
            --dist loadscope \
            --timeout=300 \
            --timeout-method=thread \
            --durations=20 \
            --cov=apps \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing \
            --cov-report=html:htmlcov-unit

      - name: Run API And Migration Tests
        timeout-minutes: 20
        run: |
          python -m pytest tests/api/ tests/migrations/ -v \
            --cov=apps \
            --cov-append \
            --cov-report=term-missing

      - name: Run Integration Tests (core)
        timeout-minutes: 30
        run: |
          python -m pytest tests/integration/ -v \
            --cov=apps \
            --cov-append \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term-missing \
            -n auto

      - name: Run App-Local Module Tests
        timeout-minutes: 25
        run: |
          python -m pytest apps/*/tests -v \
            --cov=apps \
            --cov-append \
            --cov-report=term-missing

      - name: Run Guardrail Tests
        timeout-minutes: 15
        run: |
          python -m pytest tests/guardrails/ -v \
            --cov=apps \
            --cov-append \
            --cov-report=xml:coverage-guardrail.xml

      - name: Run Playwright Smoke Tests
        timeout-minutes: 15
        run: |
          python manage.py runserver 8000 &
          sleep 3
          python -m pytest tests/playwright/tests/smoke/ -v \
            --screenshot=only-on-failure \
            --video=retain-on-failure \
            --base-url=http://127.0.0.1:8000 \
            || true  # Don't fail nightly on Playwright issues
          kill %1 || true
        env:
          DJANGO_SETTINGS_MODULE: core.settings.development
          PYTEST_PLAYWRIGHT_DRIVER: chromium

      - name: Generate Quality Report
        run: |
          python scripts/generate_quality_report.py --type nightly --output reports/quality

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            coverage-*.xml
            htmlcov-*/

      - name: Upload Quality Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-report
          path: reports/quality/

      - name: Upload Playwright Artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-artifacts
          path: |
            tests/playwright/test-results/
            tests/playwright/screenshots/

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::Nightly tests failed. Please check the logs."
          # 可以在这里添加 Slack/Discord webhook 通知
          # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          #   -H 'Content-Type: application/json' \
          #   -d '{"text":"Nightly tests failed for AgomTradePro"}'
