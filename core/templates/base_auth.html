<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AgomTradePro{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/design-tokens.css' %}">
    {% block extra_css %}{% endblock %}
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(51, 102, 204, 0.08), transparent 34%),
                linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
            color: var(--color-text-primary, #0f172a);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .auth-shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .auth-header,
        .auth-footer {
            padding: 16px 24px;
        }

        .auth-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .auth-brand {
            color: inherit;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .auth-links {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
        }

        .auth-links a {
            color: var(--color-text-secondary, #475569);
            text-decoration: none;
        }

        .auth-links a:hover {
            color: var(--color-primary, #3366cc);
        }

        .auth-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .auth-footer {
            color: var(--color-text-secondary, #475569);
            font-size: 12px;
            text-align: center;
        }

        .auth-footer p {
            margin: 0;
        }

        @media (max-width: 640px) {
            .auth-header {
                padding: 14px 16px;
            }

            .auth-links {
                gap: 12px;
                font-size: 13px;
            }

            .auth-footer {
                padding: 12px 16px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-shell">
        <header class="auth-header">
            <a href="/" class="auth-brand">AgomTradePro</a>
            <nav class="auth-links" aria-label="Authentication shortcuts">
                <a href="/docs/">文档</a>
                <a href="/account/login/">登录</a>
                <a href="/account/register/">注册</a>
            </nav>
        </header>

        <main class="auth-main">
            {% block content %}{% endblock %}
        </main>

        <footer class="auth-footer">
            <p>AgomTradePro 研究平台。系统信息仅用于研究，不构成投资建议。</p>
        </footer>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
