<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AgomSAAF - 宏观环境准入系统{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 顶部导航栏 - 系统级导航 -->
    <header class="header">
        <div class="header-container">
            <a href="/" class="header-logo">AgomSAAF</a>

            <nav class="top-nav">
                <a href="/" class="top-nav-item">首页</a>
                <a href="/regime/dashboard/" class="top-nav-item">Regime判定</a>
                <a href="/macro/data/" class="top-nav-item">宏观数据</a>
                <a href="/filter/dashboard/" class="top-nav-item">趋势滤波</a>
                <a href="/signal/manage/" class="top-nav-item">投资信号</a>

                <!-- 配置管理：下拉菜单 -->
                <div class="dropdown">
                    <span class="top-nav-item">系统</span>
                    <div class="dropdown-menu">
                        <a href="/admin/" class="dropdown-item">管理后台</a>
                        <a href="/macro/datasources/" class="dropdown-item">数据源配置</a>
                        <a href="/macro/controller/" class="dropdown-item">数据管理器</a>
                    </div>
                </div>

                <div class="dropdown">
                    <span class="top-nav-item">AI服务</span>
                    <div class="dropdown-menu">
                        <a href="/ai/" class="dropdown-item">AI接口管理</a>
                        <a href="/prompt/manage/" class="dropdown-item">Prompt模板管理</a>
                    </div>
                </div>
            </nav>

            <div class="header-actions">
                <a href="/api/docs/" class="top-nav-item">API文档</a>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main class="main-content-full">
        {% block content %}{% endblock %}
    </main>

    <!-- 页脚 -->
    <footer class="footer-full">
        <div class="footer-content">
            <p>&copy; 2024 AgomSAAF. 宏观环境准入系统 - 基于增长/通胀象限的环境准入判定框架</p>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
