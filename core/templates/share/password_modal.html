{% load static %}
<div id="passwordModal" class="share-modal-overlay">
    <div class="share-modal">
        <div class="modal-header">
            <h2 class="modal-title">密码验证</h2>
            <p class="modal-subtitle">此分享链接需要密码才能访问</p>
        </div>

        <form class="modal-body" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="sharePassword" class="form-label">请输入密码</label>
                <input
                    type="password"
                    id="sharePassword"
                    name="password"
                    class="form-input"
                    placeholder="输入访问密码"
                    required
                    autofocus
                >
                {% if password_error %}
                <p class="form-hint error">{{ password_error }}</p>
                {% else %}
                <p class="form-hint">验证通过后即可查看该分享页</p>
                {% endif %}
            </div>

            <div class="modal-actions">
                <button type="submit" class="btn btn-primary btn-block">
                    <span class="btn-text">验证访问</span>
                    <i class="bi bi-arrow-right btn-icon"></i>
                </button>
            </div>
        </form>
    </div>
</div>
