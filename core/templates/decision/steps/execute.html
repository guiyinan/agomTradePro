<div class="funnel-step-content" x-init="$nextTick(() => { loadApprovals(); loadConflicts() })" style="animation: fadeIn 0.3s ease-in-out;">
    <h3 style="margin-bottom: 20px;">阶段 5: 审批与冲突裁决</h3>
    
    <div class="attention-card" style="margin-bottom: 20px;">
        <h4 class="attention-card__title">Gate 检查与执行分发</h4>
        <p style="margin-top: 10px; color: var(--color-text-muted);">
            该阶段将 UnifiedRecommendation 固化为执行订单。包含 BUY/SELL 的去重逻辑、Beta Gate 拦截提示和终端落地（模拟盘或账户体系）。
        </p>
    </div>

    <section class="approvals-section" style="margin-bottom: 40px;">
        <div class="section-header">
            <h2 class="section-title">
                <span class="title-icon">📋</span>
                待执行审批
                <span class="badge badge-success" id="approval-count-badge">-</span>
            </h2>
            <div class="section-actions" style="display: flex; gap: 10px;">
                <select id="approval-account-selector" class="form-select form-select-sm" onchange="loadApprovals()">
                    <option value="">选择账户...</option>
                </select>
                <button class="btn btn-outline btn-sm" onclick="loadApprovals()"><i class="bi bi-arrow-clockwise"></i> 刷新审批</button>
            </div>
        </div>

        <div id="approvals-list" class="approvals-list" style="margin-top: 20px;">
            <div class="app-loading-state app-loading-state--compact">
                <div class="app-spinner" aria-hidden="true"></div>
                <p class="app-loading-text">加载中...</p>
            </div>
        </div>
    </section>

    <section class="conflicts-section">
        <div class="section-header">
            <h2 class="section-title">
                <span class="title-icon">⚠️</span>
                冲突待处理
                <span class="badge badge-warning" id="conflict-count-badge">-</span>
            </h2>
            <div class="section-actions" style="display: flex; gap: 10px;">
                <select id="conflict-account-selector" class="form-select form-select-sm" onchange="loadConflicts()">
                    <option value="">选择账户...</option>
                </select>
            </div>
        </div>

        <div id="conflicts-list" class="conflicts-list" style="margin-top: 20px;">
            <div class="app-loading-state app-loading-state--compact">
                <div class="app-spinner" aria-hidden="true"></div>
                <p class="app-loading-text">加载中...</p>
            </div>
        </div>
    </section>
</div>
