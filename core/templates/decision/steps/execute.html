<div class="funnel-step-content" x-init="$nextTick(() => loadExecutionPlanPanel())" style="animation: fadeIn 0.3s ease-in-out;">
    <h3 style="margin-bottom: 20px;">阶段 6: 审批执行</h3>
    
    <div class="attention-card" style="margin-bottom: 20px;">
        <h4 class="attention-card__title">计划审批与执行落地</h4>
        <p style="margin-top: 10px; color: var(--color-text-muted);">
            Step 6 只负责审批和执行当前交易计划。审计复盘已移至执行后的独立入口。
        </p>
    </div>

    <section class="approvals-section" style="margin-bottom: 40px;">
        <div class="section-header">
            <h2 class="section-title">
                <span class="title-icon">📋</span>
                当前审批请求
            </h2>
            <div class="section-actions" style="display: flex; gap: 10px;">
                <span class="badge badge-success">当前账户：<span data-workspace-account-name>默认账户</span></span>
                <button class="btn btn-outline btn-sm" onclick="loadExecutionPlanPanel()"><i class="bi bi-arrow-clockwise"></i> 刷新审批</button>
            </div>
        </div>

        <div id="execution-plan-panel" class="approvals-list" style="margin-top: 20px;">
            <div class="app-loading-state app-loading-state--compact">
                <div class="app-spinner" aria-hidden="true"></div>
                <p class="app-loading-text">加载中...</p>
            </div>
        </div>
    </section>

    <section class="conflicts-section">
        <div class="section-header">
            <h2 class="section-title">
                <span class="title-icon">📉</span>
                审计入口
            </h2>
            <div class="section-actions" style="display: flex; gap: 10px;">
                <a class="btn btn-outline btn-sm" href="/audit/">打开审计模块</a>
            </div>
        </div>

        <div class="card" style="padding: 18px;">
            执行完成后，请通过审计模块查看归因、损失来源和经验回写。
        </div>
    </section>
</div>
