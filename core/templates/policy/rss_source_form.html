{% extends "base.html" %}

{% block title %}RSS 源编辑 - AgomSAAF{% endblock %}

{% block content %}
<div style="max-width: 980px; margin: 0 auto; padding: 24px;">
    <h1>RSS 源配置</h1>
    <p style="color: #64748b;">通过业务页面维护 RSS 源。</p>
    <form method="post" style="background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 18px;">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="margin-top: 16px; display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{% url 'policy:rss-manage' %}" class="btn btn-secondary">返回</a>
        </div>
    </form>
</div>
{% endblock %}
