<section class="ops-summary">
    <article class="ops-card">
        <div class="ops-card-label">Tasks</div>
        <div class="ops-card-value">{{ summary.total_tasks }}</div>
    </article>
    <article class="ops-card">
        <div class="ops-card-label">Proposals</div>
        <div class="ops-card-value">{{ summary.total_proposals }}</div>
    </article>
    <article class="ops-card">
        <div class="ops-card-label">Needs Attention</div>
        <div class="ops-card-value">{{ summary.needs_attention_count }}</div>
    </article>
</section>
